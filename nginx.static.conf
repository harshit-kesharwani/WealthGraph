server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # Same-origin API — avoids CORS and broken builds when NEXT_PUBLIC_API_URL was missing in CI.
    location /api/ {
        proxy_pass https://wealthgraph-api-102631486332.us-central1.run.app/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host wealthgraph-api-102631486332.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 10m;
    }

    # Hashed assets (_next/static/chunks/*) are immutable — cache forever.
    location /_next/static/ {
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # HTML pages must revalidate so users always get the latest chunk references.
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }
}
